name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── 基础检查:格式 + clippy + 测试(全平台)──────────────────
  check:
    name: fmt + clippy + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  # ── Firecracker 集成(仅 Linux + KVM)────────────────────────
  firecracker:
    name: firecracker integration
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Enable KVM
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm
          sudo chmod 666 /dev/kvm

      - name: Download Firecracker + vmlinux
        run: |
          mkdir -p /tmp/firecracker-fixtures
          cd /tmp/firecracker-fixtures
          ARCH=x86_64
          RELEASE_URL="https://github.com/firecracker-microvm/firecracker/releases/download/v1.7.0"
          curl -fsSL -o firecracker.tgz "${RELEASE_URL}/firecracker-v1.7.0-${ARCH}.tgz"
          tar -xzf firecracker.tgz --strip-components=1
          chmod +x firecracker
          curl -fsSL -o vmlinux "${RELEASE_URL}/vmlinux-5.10.209"
          ls -la

      - name: Build minimal Alpine rootfs
        run: |
          cd /tmp/firecracker-fixtures
          curl -fsSL -o alpine-minirootfs.tar.gz "https://dl-cdn.alpinelinux.org/alpine/v3.18/releases/x86_64/alpine-minirootfs-3.18.4-x86_64.tar.gz"
          truncate -s 200M rootfs.ext4
          mkfs.ext4 rootfs.ext4
          mkdir -p /tmp/rootfs-mnt
          sudo mount rootfs.ext4 /tmp/rootfs-mnt
          sudo tar -xzf alpine-minirootfs.tar.gz -C /tmp/rootfs-mnt
          sudo umount /tmp/rootfs-mnt
          ls -la rootfs.ext4

      - name: Run Firecracker integration tests
        env:
          FIRECRACKER_BINARY: /tmp/firecracker-fixtures/firecracker
          KERNEL_IMAGE: /tmp/firecracker-fixtures/vmlinux
          ROOTFS_IMAGE: /tmp/firecracker-fixtures/rootfs.ext4
          RUST_BACKTRACE: 1
        run: cargo test -p axon-isolation --test firecracker_integration -- --ignored --nocapture
