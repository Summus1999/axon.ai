name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── 基础检查:格式 + clippy + 测试(全平台)──────────────────
  check:
    name: fmt + clippy + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  # ── Firecracker 集成(仅 Linux + KVM)────────────────────────
  # fixture(firecracker/vmlinux/rootfs.ext4)已提交进仓库(Git LFS),
  # 见 crates/axon-isolation/tests/fixtures/。避免依赖外部下载源(vmlinux 自
  # Firecracker v1.3.0 起不再随 release 发布,旧 URL 已 404)。
  firecracker:
    name: firecracker integration
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Enable KVM
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm
          sudo chmod 666 /dev/kvm

      - name: Verify fixtures present (LFS)
        run: |
          ls -la crates/axon-isolation/tests/fixtures/
          test -s crates/axon-isolation/tests/fixtures/firecracker
          test -s crates/axon-isolation/tests/fixtures/vmlinux
          test -s crates/axon-isolation/tests/fixtures/rootfs.ext4
          file crates/axon-isolation/tests/fixtures/vmlinux

      - name: Run Firecracker integration tests
        env:
          RUST_BACKTRACE: 1
        working-directory: crates/axon-isolation
        run: cargo test --test firecracker_integration -- --ignored --nocapture
